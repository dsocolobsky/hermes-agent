name: Tests

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  # Manual-only trigger for the real-Telegram job below.  Maintainers run it
  # from the Actions tab against a chosen ref; secrets are gated by the
  # `real-telegram` GitHub Environment (configure required reviewers there).
  workflow_dispatch:

permissions:
  contents: read

# Cancel in-progress runs for the same PR/branch
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    # Skip on workflow_dispatch — that trigger is reserved for the real-telegram
    # job below and would otherwise re-run the full unit suite for no reason.
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install dependencies
        run: |
          uv venv .venv --python 3.11
          source .venv/bin/activate
          uv pip install -e ".[all,dev]"

      - name: Run tests
        run: |
          source .venv/bin/activate
          python -m pytest tests/ -q --ignore=tests/integration --ignore=tests/e2e --tb=short -n auto
        env:
          # Ensure tests don't accidentally call real APIs
          OPENROUTER_API_KEY: ""
          OPENAI_API_KEY: ""
          NOUS_API_KEY: ""

  e2e:
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install dependencies
        run: |
          uv venv .venv --python 3.11
          source .venv/bin/activate
          uv pip install -e ".[all,dev]"

      - name: Run e2e tests
        run: |
          source .venv/bin/activate
          python -m pytest tests/e2e/ -v --tb=short
        env:
          OPENROUTER_API_KEY: ""
          OPENAI_API_KEY: ""
          NOUS_API_KEY: ""

  real-telegram:
    # Drives a real Hermes gateway (with a throwaway test bot token) over the
    # live Telegram network, using a Telethon user account as the test client.
    #
    # Trigger model: manual only (workflow_dispatch from the Actions tab).
    # We deliberately do NOT run on push or pull_request — the secrets used
    # here include a Telethon user-account session string with full access
    # to that account, so untrusted code (including collaborator PRs) must
    # never see them automatically.  A maintainer with repo write access runs
    # the job on demand against the chosen ref.
    #
    # The `environment: real-telegram` line gates the secrets behind a GitHub
    # Environment.  Configure required reviewers on that environment in the
    # repo settings (Settings → Environments → real-telegram → "Required
    # reviewers") to require a second maintainer's approval before each run
    # unlocks the secrets.  See tests/integration/README.md for setup notes.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: real-telegram
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install dependencies
        run: |
          uv venv .venv --python 3.11
          source .venv/bin/activate
          uv pip install -e ".[all,dev,real-tests]"

      - name: Run real-Telegram integration tests
        # -n 0 forces a single worker; only one process can poll a bot token at
        # a time.  See tests/integration/README.md for the full setup notes.
        run: |
          source .venv/bin/activate
          python -m pytest tests/integration/test_telegram_real.py -v -m real_telegram -n 0 -rs
        env:
          TELEGRAM_TEST_BOT_TOKEN: ${{ secrets.TELEGRAM_TEST_BOT_TOKEN }}
          TELEGRAM_TEST_API_ID: ${{ secrets.TELEGRAM_TEST_API_ID }}
          TELEGRAM_TEST_API_HASH: ${{ secrets.TELEGRAM_TEST_API_HASH }}
          TELEGRAM_TEST_SESSION_STRING: ${{ secrets.TELEGRAM_TEST_SESSION_STRING }}
          TELEGRAM_TEST_BOT_USERNAME: ${{ secrets.TELEGRAM_TEST_BOT_USERNAME }}
          # Don't accidentally hit a real LLM — Stage 1 is command-only.
          OPENROUTER_API_KEY: ""
          OPENAI_API_KEY: ""
          NOUS_API_KEY: ""
