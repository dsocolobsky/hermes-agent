name: Tests

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: read

# Cancel in-progress runs for the same PR/branch
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    # Skip on workflow_dispatch since that trigger is used by the
    # telegram-integration / discord-integration jobs and would
    # otherwise re-run the full unit test suite
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install dependencies
        run: |
          uv venv .venv --python 3.11
          source .venv/bin/activate
          uv pip install -e ".[all,dev]"

      - name: Run tests
        run: |
          source .venv/bin/activate
          python -m pytest tests/ -q --ignore=tests/integration --ignore=tests/e2e --tb=short -n auto
        env:
          # Ensure tests don't accidentally call real APIs
          OPENROUTER_API_KEY: ""
          OPENAI_API_KEY: ""
          NOUS_API_KEY: ""

  e2e:
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install dependencies
        run: |
          uv venv .venv --python 3.11
          source .venv/bin/activate
          uv pip install -e ".[all,dev]"

      - name: Run e2e tests
        run: |
          source .venv/bin/activate
          python -m pytest tests/e2e/ -v --tb=short
        env:
          OPENROUTER_API_KEY: ""
          OPENAI_API_KEY: ""
          NOUS_API_KEY: ""

  telegram-integration:
    # Drives a real Hermes gateway (with a throwaway test bot token) over the
    # live Telegram network, using a Telethon user account as the test client.
    # For now trigger mode is manual, to be decided when to run.
    # See tests/integration/README.md for setup
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: telegram-integration
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install dependencies
        run: |
          uv venv .venv --python 3.11
          source .venv/bin/activate
          uv pip install -e ".[all,dev,telegram-integration]"

      - name: Run Telegram integration tests
        # -n 0 forces a single worker; only one process can poll a bot token at a time
        run: |
          source .venv/bin/activate
          python -m pytest tests/integration/telegram/ -v -m telegram_integration -n 0 -rs
        env:
          TELEGRAM_TEST_BOT_TOKEN: ${{ secrets.TELEGRAM_TEST_BOT_TOKEN }}
          TELEGRAM_TEST_API_ID: ${{ secrets.TELEGRAM_TEST_API_ID }}
          TELEGRAM_TEST_API_HASH: ${{ secrets.TELEGRAM_TEST_API_HASH }}
          TELEGRAM_TEST_SESSION_STRING: ${{ secrets.TELEGRAM_TEST_SESSION_STRING }}
          TELEGRAM_TEST_BOT_USERNAME: ${{ secrets.TELEGRAM_TEST_BOT_USERNAME }}
          # For now tests should not call LLMs, so clear these just in case.
          OPENROUTER_API_KEY: ""
          OPENAI_API_KEY: ""
          NOUS_API_KEY: ""

  discord-integration:
    # Drives a real Hermes gateway (with a throwaway test bot token) over the
    # live Discord network, using a *second* Discord bot as the driver client
    # (Discord prohibits selfbots, so the Telegram approach of using a user
    # account doesn't translate). Manual trigger only.
    # See tests/integration/README.md for setup.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: discord-integration
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install dependencies
        run: |
          uv venv .venv --python 3.11
          source .venv/bin/activate
          uv pip install -e ".[all,dev,discord-integration]"

      - name: Run Discord integration tests
        # -n 0 forces a single worker; discord.py opens one gateway WebSocket
        # per token, and tests share session state.
        run: |
          source .venv/bin/activate
          python -m pytest tests/integration/discord/ -v -m discord_integration -n 0 -rs
        env:
          DISCORD_TEST_GATEWAY_BOT_TOKEN: ${{ secrets.DISCORD_TEST_GATEWAY_BOT_TOKEN }}
          DISCORD_TEST_DRIVER_BOT_TOKEN: ${{ secrets.DISCORD_TEST_DRIVER_BOT_TOKEN }}
          DISCORD_TEST_GUILD_ID: ${{ secrets.DISCORD_TEST_GUILD_ID }}
          DISCORD_TEST_CHANNEL_ID: ${{ secrets.DISCORD_TEST_CHANNEL_ID }}
          DISCORD_TEST_GATEWAY_BOT_USER_ID: ${{ secrets.DISCORD_TEST_GATEWAY_BOT_USER_ID }}
          # For now tests should not call LLMs, so clear these just in case.
          OPENROUTER_API_KEY: ""
          OPENAI_API_KEY: ""
          NOUS_API_KEY: ""
